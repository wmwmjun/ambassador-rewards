<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Albert Sans', sans-serif; background: #F5F4FF; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: white; border-radius: 18px; box-shadow: 0 2px 12px rgba(100,80,200,0.09); }
  .section-label { font-size: 10px; font-weight: 600; color: #A8A5C8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="section-label">Transaction rows</div>
  <div class="card" style="overflow:hidden">
    <!-- eGift row -->
    <div style="display:flex;align-items:center;padding:14px 16px;gap:12px">
      <div style="width:38px;height:38px;border-radius:11px;background:#FDF2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A830C4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#1A1740">Amazon eGift Card</div>
        <div style="font-size:11px;color:#A8A5C8;margin-top:2px">15 Jan 2025</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:700;color:#E66BFF">−500</div>
        <span class="badge" style="background:#F3F2FF;color:#7B72E8"><span class="dot" style="background:#A29AFF"></span>Completed</span>
      </div>
    </div>
    <!-- Award row -->
    <div style="display:flex;align-items:center;padding:14px 16px;gap:12px;border-top:1px solid #F5F4FF">
      <div style="width:38px;height:38px;border-radius:11px;background:#F3F2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7B72E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#1A1740">Points awarded</div>
        <div style="font-size:11px;color:#A8A5C8;margin-top:2px">10 Jan 2025</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:700;color:#7B72E8">+2,500</div>
        <span class="badge" style="background:#F3F2FF;color:#7B72E8"><span class="dot" style="background:#A29AFF"></span>Completed</span>
      </div>
    </div>
    <!-- Bank rejected row -->
    <div style="display:flex;align-items:center;padding:14px 16px;gap:12px;border-top:1px solid #F5F4FF">
      <div style="width:38px;height:38px;border-radius:11px;background:#EFF7FF;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A6FC5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#1A1740">Bank transfer</div>
        <div style="font-size:11px;color:#A8A5C8;margin-top:2px">2 Jan 2025</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:15px;font-weight:700;color:#FFA29B">−50,000</div>
        <span class="badge" style="background:#FFF6F5;color:#E85248"><span class="dot" style="background:#FFA29B"></span>Rejected</span>
      </div>
    </div>
  </div>

  <!-- Expanded gift code state -->
  <div class="section-label">Expanded — gift code reveal</div>
  <div class="card" style="overflow:hidden">
    <div style="display:flex;align-items:center;padding:14px 16px;gap:12px">
      <div style="width:38px;height:38px;border-radius:11px;background:#FDF2FF;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A830C4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600;color:#1A1740">Flipkart eGift Card</div><div style="font-size:11px;color:#A8A5C8;margin-top:2px">20 Dec 2024</div></div>
      <div style="text-align:right"><div style="font-size:15px;font-weight:700;color:#E66BFF">−1,000</div><span class="badge" style="background:#F3F2FF;color:#7B72E8"><span class="dot" style="background:#A29AFF"></span>Completed</span></div>
    </div>
    <div style="background:#F5F4FF;padding:12px 16px 14px;border-top:1px solid #E8E6F8">
      <div style="font-size:11px;color:#6B6880;margin-bottom:6px;font-weight:500">Gift code</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:#1A1740;letter-spacing:0.04em">FK-X92K-7TP4</span>
        <button style="padding:5px 12px;border-radius:8px;background:linear-gradient(135deg,#A29AFF,#E66BFF);border:none;color:white;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>
  </div>
</body>
</html>
