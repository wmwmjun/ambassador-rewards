<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Albert Sans', sans-serif; background: #F5F4FF; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: white; border-radius: 18px; box-shadow: 0 2px 12px rgba(100,80,200,0.09); }
  .section-label { font-size: 10px; font-weight: 600; color: #A8A5C8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <!-- Balance hero -->
  <div class="section-label">Balance hero card</div>
  <div style="background:linear-gradient(150deg,#91C6FF 0%,#A29AFF 50%,#C466E8 100%);border-radius:20px;padding:22px 22px 20px">
    <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:3px;font-weight:500">Your balance</div>
    <div style="font-size:44px;font-weight:800;color:white;letter-spacing:-0.025em;line-height:1">1,24,500</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-top:3px">points · ≈ ₹1,24,500</div>
    <div style="margin-top:12px;background:rgba(255,255,255,0.18);border-radius:10px;padding:9px 14px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,0.25)">
      <div style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.9);flex-shrink:0"></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.9);font-weight:600">800 pts expiring within 30 days</div>
    </div>
  </div>

  <!-- Stats row -->
  <div class="section-label">Stats row</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
    <div class="card" style="padding:12px 14px"><div style="font-size:11px;color:#6B6880;margin-bottom:4px">Total earned</div><div style="font-size:20px;font-weight:700;color:#1A1740;letter-spacing:-0.01em">1,40,000</div></div>
    <div class="card" style="padding:12px 14px"><div style="font-size:11px;color:#6B6880;margin-bottom:4px">Used</div><div style="font-size:20px;font-weight:700;color:#1A1740;letter-spacing:-0.01em">15,500</div></div>
    <div class="card" style="padding:12px 14px"><div style="font-size:11px;color:#6B6880;margin-bottom:4px">Expiring</div><div style="font-size:20px;font-weight:700;background:linear-gradient(135deg,#E66BFF,#FFA29B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.01em">800</div></div>
  </div>

  <!-- Expiry schedule -->
  <div class="section-label">Expiry schedule</div>
  <div class="card" style="overflow:hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px">
      <span style="font-size:15px;font-weight:700;color:#1A1740">500 pts</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#A8A5C8">Expires 30 Jun 2026</span>
        <span class="badge" style="background:#FFF6F5;color:#E85248">26d</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #F5F4FF">
      <span style="font-size:15px;font-weight:700;color:#1A1740">300 pts</span>
      <span style="font-size:12px;color:#A8A5C8">Expires 10 Jul 2026</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid #F5F4FF">
      <span style="font-size:15px;font-weight:700;color:#1A1740">10,000 pts</span>
      <span style="font-size:12px;color:#A8A5C8">Expires 14 Jan 2027</span>
    </div>
  </div>
</body>
</html>
