<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F5F4F0; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: 10px; font-weight: 600; color: #A8A6A0; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }

  /* Spacing scale */
  .space-row { display: flex; align-items: center; gap: 12px; padding: 5px 0; }
  .space-bar { background: #1A1A2E; border-radius: 3px; height: 20px; flex-shrink: 0; }
  .space-name { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6B6B80; min-width: 60px; }
  .space-val  { font-size: 12px; color: #A8A6A0; }

  /* Radii */
  .radii-row { display: flex; flex-wrap: wrap; gap: 12px; }
  .radius-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .radius-box { width: 56px; height: 40px; background: #1A1A2E; }
  .radius-label { font-size: 11px; color: #6B6B80; text-align: center; }
  .radius-val   { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #A8A6A0; }

  /* Shadows */
  .shadow-row { display: flex; flex-wrap: wrap; gap: 12px; }
  .shadow-box { width: 80px; height: 52px; background: white; border-radius: 10px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .shadow-name { font-size: 10px; color: #6B6B80; font-weight: 600; }
</style>
</head>
<body>
  <div class="section-title">Spacing scale (base 4px)</div>
  <div>
    <div class="space-row"><div class="space-bar" style="width:4px"></div><span class="space-name">space-1</span><span class="space-val">4px</span></div>
    <div class="space-row"><div class="space-bar" style="width:8px"></div><span class="space-name">space-2</span><span class="space-val">8px</span></div>
    <div class="space-row"><div class="space-bar" style="width:12px"></div><span class="space-name">space-3</span><span class="space-val">12px</span></div>
    <div class="space-row"><div class="space-bar" style="width:16px"></div><span class="space-name">space-4</span><span class="space-val">16px</span></div>
    <div class="space-row"><div class="space-bar" style="width:20px"></div><span class="space-name">space-5</span><span class="space-val">20px</span></div>
    <div class="space-row"><div class="space-bar" style="width:24px"></div><span class="space-name">space-6</span><span class="space-val">24px</span></div>
    <div class="space-row"><div class="space-bar" style="width:32px"></div><span class="space-name">space-8</span><span class="space-val">32px</span></div>
    <div class="space-row"><div class="space-bar" style="width:40px"></div><span class="space-name">space-10</span><span class="space-val">40px</span></div>
    <div class="space-row"><div class="space-bar" style="width:48px"></div><span class="space-name">space-12</span><span class="space-val">48px</span></div>
    <div class="space-row"><div class="space-bar" style="width:64px"></div><span class="space-name">space-16</span><span class="space-val">64px</span></div>
  </div>

  <div class="section-title">Corner radii</div>
  <div class="radii-row">
    <div class="radius-item"><div class="radius-box" style="border-radius:6px"></div><div class="radius-label">sm</div><div class="radius-val">6px</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:10px"></div><div class="radius-label">md</div><div class="radius-val">10px</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:16px"></div><div class="radius-label">lg</div><div class="radius-val">16px</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:24px"></div><div class="radius-label">xl</div><div class="radius-val">24px</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:999px"></div><div class="radius-label">pill</div><div class="radius-val">999px</div></div>
  </div>

  <div class="section-title">Elevation / shadows</div>
  <div class="shadow-row">
    <div>
      <div class="shadow-box" style="box-shadow:0 1px 4px rgba(0,0,0,0.06)"><span class="shadow-name">sm</span></div>
      <div style="font-size:10px;color:#A8A6A0;margin-top:4px;font-family:monospace">0 1px 4px</div>
    </div>
    <div>
      <div class="shadow-box" style="box-shadow:0 2px 8px rgba(0,0,0,0.08)"><span class="shadow-name">md</span></div>
      <div style="font-size:10px;color:#A8A6A0;margin-top:4px;font-family:monospace">0 2px 8px</div>
    </div>
    <div>
      <div class="shadow-box" style="box-shadow:0 4px 20px rgba(0,0,0,0.10)"><span class="shadow-name">lg</span></div>
      <div style="font-size:10px;color:#A8A6A0;margin-top:4px;font-family:monospace">0 4px 20px</div>
    </div>
    <div>
      <div class="shadow-box" style="box-shadow:0 8px 32px rgba(0,0,0,0.12)"><span class="shadow-name">xl</span></div>
      <div style="font-size:10px;color:#A8A6A0;margin-top:4px;font-family:monospace">0 8px 32px</div>
    </div>
  </div>
</body>
</html>
